[profile.default]
src = "contracts"
out = "artifacts"
libs = ["lib"]
test = "tests"
cache_path = "cache"
broadcast = "broadcast"

# Compiler settings
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 10000
via_ir = true

# EVM version (Shanghai for EIP-4337 compatibility)
evm_version = "shanghai"

# Gas reporting
gas_reports = ["ZKNOX_FALCON_Verifier", "QBTCAccount", "QBTCToken", "QPoARegistry", "QuantumOracle"]

# Fuzz testing
[profile.default.fuzz]
runs = 10000
max_test_rejects = 65536
seed = "0xdeadbeef"

# Invariant testing
[profile.default.invariant]
runs = 512
depth = 15
call_override = false

# CI profile (faster)
[profile.ci]
src = "contracts"
optimizer = true
optimizer_runs = 200
fuzz = { runs = 1000 }
invariant = { runs = 100 }

# Production profile (maximum optimization)
[profile.production]
src = "contracts"
optimizer = true
optimizer_runs = 1000000
via_ir = true

# Remappings
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@zknox/=lib/zknox/",
    "forge-std/=lib/forge-std/src/",
]

# RPC endpoints for testing
[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
optimism_sepolia = "https://sepolia.optimism.io"
arbitrum_sepolia = "https://sepolia-rollup.arbitrum.io/rpc"
qbtc_testnet = "http://localhost:8545"

# Etherscan API keys for verification
[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
