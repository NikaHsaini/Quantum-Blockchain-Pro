name: QUBITCOIN CI/CD Pipeline

on:
  push:
    branches: [ main, develop, "release/*" ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security audit every day at 02:00 UTC
    - cron: '0 2 * * *'

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  FOUNDRY_VERSION: 'stable'

jobs:

  # ============================================================
  # 1. Go Build & Unit Tests
  # ============================================================
  go-build-test:
    name: Go Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download Go dependencies
        run: |
          cd qbtc-chain
          go mod download
          go mod verify

      - name: Build QBTC node
        run: |
          cd qbtc-chain
          go build -v -ldflags="-X main.version=$(git describe --tags --always)" ./cmd/qbtc/...

      - name: Run unit tests
        run: |
          cd qbtc-chain
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Run NTT tests
        run: |
          cd tests/unit
          go test -v -run TestNTT ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: qbtc-chain/coverage.out
          flags: go-unit-tests

  # ============================================================
  # 2. Go Benchmarks
  # ============================================================
  go-benchmarks:
    name: Go Benchmarks
    runs-on: ubuntu-latest
    needs: go-build-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run benchmarks
        run: |
          cd tests/unit
          go test -bench=. -benchmem -benchtime=10s ./... | tee benchmark_results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: tests/unit/benchmark_results.txt

  # ============================================================
  # 3. Solidity Tests (Foundry)
  # ============================================================
  solidity-tests:
    name: Solidity Tests (Foundry)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Solidity dependencies
        run: |
          forge install

      - name: Build Solidity contracts
        run: |
          forge build --sizes

      - name: Run Solidity tests
        run: |
          forge test -vvv --gas-report

      - name: Run FALCON verifier gas benchmarks
        run: |
          forge test --match-contract "ZKNOX_FALCON" --gas-report -vvv

      - name: Check contract sizes
        run: |
          forge build --sizes 2>&1 | grep -E "(ZKNOX|QBTC|QPoA)" || true

  # ============================================================
  # 4. Security Audit
  # ============================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd qbtc-chain && govulncheck ./...

      - name: Run staticcheck (Go linter)
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          cd qbtc-chain && staticcheck ./...

      - name: Run Slither (Solidity static analysis)
        uses: crytic/slither-action@v0.3.2
        with:
          target: contracts/
          slither-args: '--filter-paths "lib/" --exclude-dependencies'
        continue-on-error: true

      - name: Run gosec (Go security scanner)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd qbtc-chain && gosec -fmt=json -out=gosec-results.json ./... || true

      - name: Upload security results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: qbtc-chain/gosec-results.json

  # ============================================================
  # 5. Post-Quantum Cryptography Validation
  # ============================================================
  pq-validation:
    name: Post-Quantum Cryptography Validation
    runs-on: ubuntu-latest
    needs: go-build-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Validate NIST KAT vectors (ML-DSA)
        run: |
          cd tests/vectors
          go test -v -run TestMLDSA_KAT ./...

      - name: Validate NIST KAT vectors (ML-KEM)
        run: |
          cd tests/vectors
          go test -v -run TestMLKEM_KAT ./...

      - name: Validate FALCON test vectors
        run: |
          cd tests/vectors
          go test -v -run TestFALCON ./...

      - name: Validate ETHFALCON ZKnox vectors
        run: |
          cd tests/vectors
          go test -v -run TestETHFALCON ./...

  # ============================================================
  # 6. Integration Tests
  # ============================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [go-build-test, solidity-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Start local QBTC node
        run: |
          cd qbtc-chain
          go build -o /tmp/qbtc ./cmd/qbtc/
          /tmp/qbtc --dev --datadir /tmp/qbtc-data &
          sleep 5

      - name: Run integration tests
        run: |
          cd tests/integration
          go test -v -timeout 120s ./...

      - name: Test QPoA consensus
        run: |
          cd tests/integration
          go test -v -run TestQPoA ./...

      - name: Test FALCON account abstraction
        run: |
          cd tests/integration
          go test -v -run TestQBTCAccount ./...

  # ============================================================
  # 7. Docker Build
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go-build-test, solidity-tests]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: qubitcoin/qbtc-node:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 8. Release (on tag push)
  # ============================================================
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [go-build-test, solidity-tests, security-audit, pq-validation]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build release binaries
        run: |
          cd qbtc-chain
          GOOS=linux   GOARCH=amd64 go build -o ../dist/qbtc-linux-amd64   ./cmd/qbtc/
          GOOS=linux   GOARCH=arm64 go build -o ../dist/qbtc-linux-arm64   ./cmd/qbtc/
          GOOS=darwin  GOARCH=amd64 go build -o ../dist/qbtc-darwin-amd64  ./cmd/qbtc/
          GOOS=darwin  GOARCH=arm64 go build -o ../dist/qbtc-darwin-arm64  ./cmd/qbtc/
          GOOS=windows GOARCH=amd64 go build -o ../dist/qbtc-windows-amd64.exe ./cmd/qbtc/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## QUBITCOIN (QBTC) Release ${{ github.ref_name }}

            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Cryptographic Standards
            - FALCON-512/1024 (NIST FIPS 206)
            - ML-DSA-65 (NIST FIPS 204)
            - ML-KEM-768 (NIST FIPS 203)
            - ETHFALCON (ZKnox EVM-optimized)
            - EPERVIER (ZKnox FALCON with recovery)

            ### Security
            All cryptographic implementations validated against NIST KAT vectors.
